[build]
  base = "."
  command = "corepack enable && corepack prepare pnpm@10.26.1 --activate && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/steakz run build"
  publish = "artifacts/steakz/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PORT = "5000"
  BASE_PATH = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
