[build]
  base = "."
  publish = "artifacts/steakz/dist/public"
  command = """
    corepack enable && \
    corepack prepare pnpm@10.26.1 --activate && \
    pnpm install --no-frozen-lockfile --ignore-scripts=false && \
    pnpm --filter @workspace/steakz run build
  """

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"
  PORT = "5000"
  BASE_PATH = "/"
  CI = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
